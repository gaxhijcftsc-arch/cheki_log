<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>チェキログ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#f0f0f0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;}
input,select,textarea,button{font-family:inherit;}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #e0e0e0;}
.btn{width:100%;padding:14px;border-radius:14px;border:none;background:#3a3a3a;color:#fff;font-weight:900;font-size:15px;cursor:pointer;}
.btn.green{background:#4caf50;}
.btn.red{background:#ff5252;}
.btn.gray{background:#aaa;}
label{display:block;font-size:11px;color:#9e9e9e;font-weight:600;margin-bottom:4px;}
input[type=text],input[type=date],select,textarea{width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:9px 12px;font-size:14px;background:#fff;outline:none;color:#3a3a3a;margin-bottom:12px;}
.tag{background:#ede9ff;color:#6c63ff;border-radius:99px;font-size:10px;padding:2px 8px;font-weight:700;display:inline-block;}
.tag.gray{background:#f5f5f5;color:#666;}
.mini-card{display:flex;gap:12px;background:#fff;border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;border:1px solid #e0e0e0;align-items:center;}
.thumb{border-radius:8px;background:#e8e8e8;overflow:hidden;flex-shrink:0;border:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:50;}
.nav button{flex:1;padding:8px 0 10px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:#9e9e9e;}
.nav button.active{color:#6c63ff;}
.nav button .dot{width:16px;height:2px;background:#6c63ff;border-radius:99px;margin-top:2px;}
.header{padding:16px 20px 12px;background:#f0f0f0;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;}
.tab{display:none;padding:16px 16px 24px;}
.tab.active{display:block;}
.seg{display:flex;background:#e4e4e4;border-radius:10px;padding:3px;gap:2px;margin-bottom:12px;}
.seg button{flex:1;padding:6px 0;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#9e9e9e;}
.seg button.active{background:#fff;color:#3a3a3a;}
.pill{padding:5px 13px;border-radius:99px;border:1.5px solid #e0e0e0;background:#fff;color:#666;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.pill.active{border-color:#6c63ff;background:#6c63ff;color:#fff;}
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#f0f0f0;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px;padding-bottom:40px;max-height:85vh;overflow-y:auto;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{border-radius:10px;padding:4px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;min-height:54px;}
.stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0 20px;}
.stat-card{background:#fff;border-radius:16px;padding:14px 10px;text-align:center;}
#loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;font-size:14px;color:#9e9e9e;}
</style>
</head>
<body>
<div id="loading"><div style="font-size:32px">📷</div><div>読み込み中...</div></div>
<div id="app" style="display:none">
  <div class="header">
    <div style="font-size:22px;font-weight:900;color:#3a3a3a;letter-spacing:-0.5px">チェキログ</div>
    <div id="total-label" style="font-size:11px;color:#9e9e9e">Total: 0枚 / 0名</div>
  </div>

  <!-- 登録 -->

  <div id="tab-reg" class="tab active">
    <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px;margin-bottom:16px">NEW CHEKI</div>
    <div id="img-picker" style="width:100%;height:180px;background:#fff;border:2px dashed #e0e0e0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:20px;overflow:hidden;">
      <div style="font-size:36px;margin-bottom:8px">📷</div>
      <div style="font-size:13px;color:#9e9e9e">タップして写真を追加</div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none"/>
    <div class="card" style="padding:16px 16px 4px">
      <label>日付</label><input type="date" id="reg-date"/>
      <label>アイドル名 *</label><input type="text" id="reg-idol" placeholder="例: 〇〇 〇〇"/>
      <label>グループ名</label><input type="text" id="reg-group" placeholder="例: 〇〇グループ"/>
      <label>イベント名</label><input type="text" id="reg-event" placeholder="例: 〇〇フェス"/>
      <label>場所</label><input type="text" id="reg-place" placeholder="例: ライブハウス"/>
    </div>
    <button class="btn" id="reg-btn" style="margin-top:16px">登録する</button>
  </div>

  <!-- カレンダー -->

  <div id="tab-cal" class="tab">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button id="cal-prev" style="width:36px;height:36px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:16px">‹</button>
      <span id="cal-title" style="font-weight:900;font-size:17px;color:#3a3a3a"></span>
      <button id="cal-next" style="width:36px;height:36px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:16px">›</button>
    </div>
    <div class="card" style="padding:12px">
      <div class="cal-grid" id="cal-weeks"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div id="cal-list"></div>
  </div>

  <!-- 集計 -->

  <div id="tab-stat" class="tab">
    <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px;margin-bottom:12px">STATISTICS</div>
    <div class="seg">
      <button class="active" onclick="setStat('月別',this)">月別</button>
      <button onclick="setStat('年別',this)">年別</button>
      <button onclick="setStat('全期間',this)">全期間</button>
    </div>
    <div id="stat-picker" style="display:flex;gap:8px;align-items:center;background:#fff;border-radius:12px;padding:8px 12px;margin-bottom:12px">
      <select id="stat-year" style="margin-bottom:0"></select><span style="color:#9e9e9e;font-size:13px">年</span>
      <select id="stat-month" style="margin-bottom:0"></select><span id="stat-month-label" style="color:#9e9e9e;font-size:13px">月</span>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div style="font-size:22px;margin-bottom:4px">📷</div><div id="sc-cheki" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">チェキ</div></div>
      <div class="stat-card"><div style="font-size:22px;margin-bottom:4px">⭐</div><div id="sc-idol" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">メンバー</div></div>
      <div class="stat-card"><div style="font-size:22px;margin-bottom:4px">🎪</div><div id="sc-event" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">イベント</div></div>
    </div>
    <div style="font-size:11px;font-weight:700;color:#9e9e9e;letter-spacing:1px;margin-bottom:10px">RANKING</div>
    <div class="card" id="stat-ranking" style="padding:0;overflow:hidden"></div>
  </div>

  <!-- 一覧 -->

  <div id="tab-list" class="tab">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="search-input" placeholder="🔍  名前・イベント・場所で検索" style="flex:1;margin-bottom:0"/>
      <button onclick="exportCSV()" style="padding:9px 14px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:13px;font-weight:700;color:#3a3a3a;white-space:nowrap">⬇ CSV</button>
    </div>
    <div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#9e9e9e;margin-bottom:6px;letter-spacing:1px">グループ</div><div class="pills" id="group-pills"></div></div>
    <div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#9e9e9e;margin-bottom:6px;letter-spacing:1px">会場</div><div class="pills" id="place-pills"></div></div>
    <div id="list-count" style="font-size:12px;color:#9e9e9e;margin-bottom:10px"></div>
    <div id="list-items"></div>
  </div>

  <!-- プロフィール -->

  <div id="tab-prof" class="tab">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px">PROFILES</div>
      <button onclick="openProfEdit(null)" style="border:none;background:#3a3a3a;color:#fff;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer">＋ 追加</button>
    </div>
    <div id="prof-list"></div>
  </div>

  <nav class="nav">
    <button class="active" onclick="showTab('reg',this)"><span style="font-size:16px">＋</span>登録<div class="dot"></div></button>
    <button onclick="showTab('cal',this)"><span style="font-size:16px">📅</span>カレンダー</button>
    <button onclick="showTab('stat',this)"><span style="font-size:16px">📊</span>集計</button>
    <button onclick="showTab('list',this)"><span style="font-size:16px">🗂</span>一覧</button>
    <button onclick="showTab('prof',this)"><span style="font-size:16px">⭐</span>プロフィール</button>
  </nav>
</div>

<!-- 詳細モーダル -->

<div id="modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
const SUPA="https://itqqfcpvyhlchmaafxps.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0cXFmY3B2eWhsY2htYWFmeHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjA5NjIsImV4cCI6MjA5Mjc5Njk2Mn0.H_cBHlh05ZThfcxX2UlVivQ8gDA-_DFdRsuVG1mqs-s";
const H={"Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY};

let chekiList=[], profiles=[], regImage=null;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSelected=null;
let statPeriod="月別", statYear=new Date().getFullYear(), statMonth=new Date().getMonth()+1;
let listGroupF="すべて", listPlaceF="すべて";
const COLORS=["#9c6fde","#e9967a","#5ba87b","#e9c46a","#4ea8de","#e76f51","#adb5bd","#f4a261"];

async function api(method,path,body){
  const opts={method,headers:{...H}};
  if(body){opts.body=JSON.stringify(body);}
  if(method==="POST")opts.headers["Prefer"]="return=representation";
  if(method==="PATCH")opts.headers["Prefer"]="return=representation";
  const r=await fetch(SUPA+path,opts);
  const t=await r.text();
  try{return JSON.parse(t);}catch{return null;}
}

function avatarColor(name,color){
  if(color)return color;
  if(!name)return"#aaa";
  let h=[...name].reduce((a,c)=>a+c.charCodeAt(0),0)%360;
  return"hsl("+h+",55%,70%)";
}
function avatarHTML(name,color,size){
  const bg=avatarColor(name,color);
  const ch=name?name[0]:"?";
  return'<div class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+bg+';font-size:'+(size*0.42)+'px">'+ch+'</div>';
}
function thumbHTML(image,idol,color,size){
  const w=size==="sm"?44:size==="md"?80:120, h=Math.round(w*1.4);
  if(image)return'<div class="thumb" style="width:'+w+'px;height:'+h+'px"><img src="'+image+'" style="width:100%;height:100%;object-fit:cover"/></div>';
  return'<div class="thumb" style="width:'+w+'px;height:'+h+'px">'+avatarHTML(idol,color,w*0.6)+'</div>';
}
function getProfile(c){return profiles.find(p=>p.idol===c.idol&&p.group_name===c.group_name)||null;}
function formatDate(ds){
  if(!ds)return"";
  const d=new Date(ds+"T00:00:00");
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
}
function uniq(arr){return[...new Set(arr.filter(Boolean))];}

// ── Nav ──
function showTab(name,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.querySelectorAll(".nav button").forEach(b=>{b.classList.remove("active");b.querySelector(".dot")&&b.querySelector(".dot").remove();});
  btn.classList.add("active");
  if(!btn.querySelector(".dot")){const d=document.createElement("div");d.className="dot";btn.appendChild(d);}
  if(name==="cal")renderCal();
  if(name==="stat")renderStat();
  if(name==="list")renderList();
  if(name==="prof")renderProf();
}

// ── 登録 ──
document.getElementById("img-picker").onclick=()=>document.getElementById("file-input").click();
document.getElementById("file-input").onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=ev=>{
    regImage=ev.target.result;
    document.getElementById("img-picker").innerHTML='<img src="'+regImage+'" style="width:100%;height:100%;object-fit:contain"/>';
  }; r.readAsDataURL(f);
};
document.getElementById("reg-btn").onclick=async()=>{
  const date=document.getElementById("reg-date").value;
  const idol=document.getElementById("reg-idol").value.trim();
  if(!date||!idol){alert("日付とアイドル名は必須です");return;}
  const btn=document.getElementById("reg-btn");
  btn.textContent="保存中...";btn.className="btn gray";btn.disabled=true;
  const item={date,idol,group_name:document.getElementById("reg-group").value.trim(),event:document.getElementById("reg-event").value.trim(),place:document.getElementById("reg-place").value.trim(),image:regImage};
  const res=await api("POST","/rest/v1/cheki",item);
  if(Array.isArray(res)&&res[0])chekiList.push(res[0]);
  else chekiList.push({...item,id:Date.now()});
  document.getElementById("reg-date").value="";
  document.getElementById("reg-idol").value="";
  document.getElementById("reg-group").value="";
  document.getElementById("reg-event").value="";
  document.getElementById("reg-place").value="";
  regImage=null;
  document.getElementById("img-picker").innerHTML='<div style="font-size:36px;margin-bottom:8px">📷</div><div style="font-size:13px;color:#9e9e9e">タップして写真を追加</div>';
  updateTotal();
  btn.textContent="✓ 保存しました！";btn.className="btn green";btn.disabled=false;
  setTimeout(()=>{btn.textContent="登録する";btn.className="btn";},2500);
};

// ── カレンダー ──
const WEEK=["日","月","火","水","木","金","土"];
document.getElementById("cal-prev").onclick=()=>{if(calMonth===0){calYear--;calMonth=11;}else calMonth--;calSelected=null;renderCal();};
document.getElementById("cal-next").onclick=()=>{if(calMonth===11){calYear++;calMonth=0;}else calMonth++;calSelected=null;renderCal();};
function renderCal(){
  document.getElementById("cal-title").textContent=calYear+"年 "+(calMonth+1)+"月";
  const wEl=document.getElementById("cal-weeks");
  wEl.innerHTML=WEEK.map((w,i)=>'<div style="text-align:center;font-size:11px;font-weight:700;color:'+(i===0?"#e53935":i===6?"#1e88e5":"#9e9e9e")+';padding:4px 0">'+w+'</div>').join("");
  const byDate={};
  chekiList.forEach(c=>{if(!byDate[c.date])byDate[c.date]=[];byDate[c.date].push(c);});
  const days=new Date(calYear,calMonth+1,0).getDate();
  const first=new Date(calYear,calMonth,1).getDay();
  let html=Array(first).fill('<div></div>').join("");
  for(let i=1;i<=days;i++){
    const key=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(i).padStart(2,"0");
    const items=byDate[key]||[];
    const isSel=calSelected===i;
    const dow=(first+i-1)%7;
    const col=isSel?"#fff":dow===0?"#e53935":dow===6?"#1e88e5":"#3a3a3a";
    let inner='<span style="font-size:12px;font-weight:700;color:'+col+'">'+i+'</span>';
    if(items.length>0){
      const p=getProfile(items[0]);
      inner+='<div style="width:28px;height:38px;border-radius:5px;background:#e0e0e0;overflow:hidden;margin-top:2px;display:flex;align-items:center;justify-content:center">';
      if(items[0].image)inner+='<img src="'+items[0].image+'" style="width:100%;height:100%;object-fit:cover"/>';
      else inner+=avatarHTML(items[0].idol,p&&p.color,16);
      inner+='</div>';
      if(items.length>1)inner+='<span style="font-size:9px;font-weight:700;color:'+(isSel?"#fff":"#6c63ff")+'">+'+items.length+'</span>';
    }
    html+='<div class="cal-day" style="background:'+(isSel?"#3a3a3a":"transparent")+'" onclick="calClick('+i+')">'+inner+'</div>';
  }
  document.getElementById("cal-grid").innerHTML=html;
  renderCalList();
}
function calClick(d){calSelected=calSelected===d?null:d;renderCal();}
function renderCalList(){
  const el=document.getElementById("cal-list");
  if(!calSelected){el.innerHTML="";return;}
  const key=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(calSelected).padStart(2,"0");
  const items=chekiList.filter(c=>c.date===key);
  el.innerHTML='<div style="font-size:13px;font-weight:700;color:#9e9e9e;margin-bottom:10px">'+(calMonth+1)+"月"+calSelected+"日 — "+items.length+'枚</div>';
  if(items.length===0){el.innerHTML+='<div style="text-align:center;color:#9e9e9e;font-size:13px;padding:20px 0">この日のチェキはありません</div>';return;}
  el.innerHTML+=items.map(c=>miniCardHTML(c)).join("");
  el.querySelectorAll(".mini-card").forEach((el,i)=>el.onclick=()=>openDetail(items[i]));
}

// ── 集計 ──
function setStat(p,btn){
  statPeriod=p;
  document.querySelectorAll("#tab-stat .seg button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("stat-picker").style.display=p==="全期間"?"none":"flex";
  document.getElementById("stat-month").style.display=p==="月別"?"block":"none";
  document.getElementById("stat-month-label").style.display=p==="月別"?"block":"none";
  renderStat();
}
function renderStat(){
  const yr=parseInt(document.getElementById("stat-year").value)||statYear;
  const mo=parseInt(document.getElementById("stat-month").value)||statMonth;
  let f=chekiList;
  if(statPeriod==="月別")f=chekiList.filter(c=>{const d=new Date((c.date||"")+"T00:00:00");return d.getFullYear()===yr&&d.getMonth()+1===mo;});
  else if(statPeriod==="年別")f=chekiList.filter(c=>new Date((c.date||"")+"T00:00:00").getFullYear()===yr);
  document.getElementById("sc-cheki").textContent=f.length;
  document.getElementById("sc-idol").textContent=new Set(f.map(c=>c.idol).filter(Boolean)).size;
  document.getElementById("sc-event").textContent=new Set(f.map(c=>c.event).filter(Boolean)).size;
  const cnt={};f.forEach(c=>{if(c.idol)cnt[c.idol]=(cnt[c.idol]||0)+1;});
  const rank=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const max=rank[0]?.[1]||1;
  const rankEl=document.getElementById("stat-ranking");
  if(rank.length===0){rankEl.innerHTML='<div style="text-align:center;color:#9e9e9e;font-size:13px;padding:24px 0">データがありません</div>';return;}
  rankEl.innerHTML=rank.map(([name,count],i)=>{
    const medal=i===0?"#ffd54f":i===1?"#cfd8dc":i===2?"#ffab91":"#eee";
    return'<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:'+(i<rank.length-1?"1px solid #e0e0e0":"none")+'">'
      +'<div style="width:24px;height:24px;border-radius:50%;background:'+medal+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#555;flex-shrink:0">'+(i+1)+'</div>'
      +avatarHTML(name,null,30)
      +'<span style="flex:1;font-size:14px;font-weight:700;color:#3a3a3a">'+name+'</span>'
      +'<div style="width:80px;display:flex;align-items:center;gap:6px"><div style="flex:1;height:6px;background:#ececec;border-radius:99px;overflow:hidden"><div style="height:100%;width:'+(count/max*100)+'%;background:#6c63ff;border-radius:99px"></div></div><span style="font-size:13px;font-weight:900;color:#3a3a3a;min-width:20px;text-align:right">'+count+'</span></div>'
      +'</div>';
  }).join("");
}

// ── 一覧 ──
document.getElementById("search-input").oninput=renderList;
function renderList(){
  const search=document.getElementById("search-input").value;
  const groups=["すべて",...uniq(chekiList.map(c=>c.group_name))];
  const places=["すべて",...uniq(chekiList.map(c=>c.place))];
  document.getElementById("group-pills").innerHTML=groups.map(g=>'<button class="pill'+(listGroupF===g?" active":"")+'" onclick="setGroupF(\''+g.replace(/'/g,"\\'")+'\')">' +g+'</button>').join("");
  document.getElementById("place-pills").innerHTML=places.map(p=>'<button class="pill'+(listPlaceF===p?" active":"")+'" onclick="setPlaceF(\''+p.replace(/'/g,"\\'")+'\')">' +p+'</button>').join("");
  let f=chekiList
    .filter(c=>listGroupF==="すべて"||c.group_name===listGroupF)
    .filter(c=>listPlaceF==="すべて"||c.place===listPlaceF)
    .filter(c=>!search||[c.idol,c.event,c.place,c.group_name,c.date].some(v=>v&&v.includes(search)))
    .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  document.getElementById("list-count").textContent=f.length+"件";
  const el=document.getElementById("list-items");
  if(f.length===0){el.innerHTML='<div style="text-align:center;color:#9e9e9e;font-size:13px;padding:32px 0">該当するチェキがありません</div>';return;}
  el.innerHTML=f.map(c=>miniCardHTML(c)).join("");
  el.querySelectorAll(".mini-card").forEach((el,i)=>el.onclick=()=>openDetail(f[i]));
}
function setGroupF(g){listGroupF=g;renderList();}

function exportCSV(){
  const header="日付,アイドル名,グループ名,イベント名,場所";

  const csv="\uFEFF"+[header,...rows].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="chekiLog.csv";a.click();
}
