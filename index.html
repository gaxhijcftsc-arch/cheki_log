<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>チェキログ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#f0f0f0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;}
input,select,textarea,button{font-family:inherit;}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #e0e0e0;}
.btn{width:100%;padding:14px;border-radius:14px;border:none;background:#3a3a3a;color:#fff;font-weight:900;font-size:15px;cursor:pointer;display:block;margin-top:8px;}
.btn.green{background:#4caf50;}.btn.red{background:#ff5252;}.btn.gray{background:#aaa;}
.btn.white{background:#fff;color:#3a3a3a;border:1.5px solid #e0e0e0;}
label{display:block;font-size:11px;color:#9e9e9e;font-weight:600;margin-bottom:4px;}
input[type=text],input[type=date],select,textarea{width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:9px 12px;font-size:14px;background:#fff;outline:none;color:#3a3a3a;margin-bottom:12px;}
.tag{background:#ede9ff;color:#6c63ff;border-radius:99px;font-size:10px;padding:2px 8px;font-weight:700;display:inline-block;}
.tag.gray{background:#f5f5f5;color:#666;}
.mini-card{display:flex;gap:12px;background:#fff;border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;border:1px solid #e0e0e0;align-items:center;}
.thumb{border-radius:8px;background:#e8e8e8;overflow:hidden;flex-shrink:0;border:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:50;}
.nav button{flex:1;padding:8px 0 10px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:#9e9e9e;}
.nav button.on{color:#6c63ff;}
.dot{width:16px;height:2px;background:#6c63ff;border-radius:99px;margin-top:2px;}
.hdr{padding:16px 20px 12px;background:#f0f0f0;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;}
.tab{display:none;padding:16px 16px 24px;}
.tab.on{display:block;}
.seg{display:flex;background:#e4e4e4;border-radius:10px;padding:3px;gap:2px;margin-bottom:12px;}
.seg button{flex:1;padding:6px 0;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#9e9e9e;}
.seg button.on{background:#fff;color:#3a3a3a;}
.pill{padding:5px 13px;border-radius:99px;border:1.5px solid #e0e0e0;background:#fff;color:#666;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.pill.on{border-color:#6c63ff;background:#6c63ff;color:#fff;}
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.mbg.on{display:flex;}
.modal{background:#f0f0f0;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px;padding-bottom:40px;max-height:85vh;overflow-y:auto;}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cd{border-radius:10px;padding:4px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;min-height:54px;}
.sc{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0 20px;}
.sc div{background:#fff;border-radius:16px;padding:14px 10px;text-align:center;}
.sync-bar{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:8px 12px;font-size:12px;color:#856404;margin-bottom:12px;display:none;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="font-size:22px;font-weight:900;color:#3a3a3a">チェキログ</div>
    <div id="tlabel" style="font-size:11px;color:#9e9e9e">Total: 0枚 / 0名</div>
    <div id="syncbar" class="sync-bar">⚠️ オフラインモード：データはこの端末にのみ保存されます</div>
  </div>

  <div id="t-reg" class="tab on">
    <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px;margin-bottom:16px">NEW CHEKI</div>
    <div id="imgbox" style="width:100%;height:180px;background:#fff;border:2px dashed #e0e0e0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:20px;overflow:hidden;">
      <div style="font-size:36px;margin-bottom:8px">📷</div>
      <div style="font-size:13px;color:#9e9e9e">タップして写真を追加</div>
    </div>
    <input type="file" id="filein" accept="image/*" style="display:none"/>
    <div class="card" style="padding:16px 16px 4px">
      <label>日付</label><input type="date" id="r-date"/>
      <label>アイドル名 *</label><input type="text" id="r-idol" placeholder="例: 〇〇 〇〇"/>
      <label>グループ名</label><input type="text" id="r-group" placeholder="例: 〇〇グループ"/>
      <label>イベント名</label><input type="text" id="r-event" placeholder="例: 〇〇フェス"/>
      <label>場所</label><input type="text" id="r-place" placeholder="例: ライブハウス"/>
    </div>
    <button class="btn" id="rbtn" style="margin-top:16px">登録する</button>
  </div>

  <div id="t-cal" class="tab">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button id="cprev" style="width:36px;height:36px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:16px">‹</button>
      <span id="ctitle" style="font-weight:900;font-size:17px;color:#3a3a3a"></span>
      <button id="cnext" style="width:36px;height:36px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:16px">›</button>
    </div>
    <div class="card" style="padding:12px">
      <div class="cg" id="cweeks"></div>
      <div class="cg" id="cgrid"></div>
    </div>
    <div id="clist"></div>
  </div>

  <div id="t-stat" class="tab">
    <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px;margin-bottom:12px">STATISTICS</div>
    <div class="seg">
      <button class="on" onclick="setStat('月別',this)">月別</button>
      <button onclick="setStat('年別',this)">年別</button>
      <button onclick="setStat('全期間',this)">全期間</button>
    </div>
    <div id="spick" style="display:flex;gap:8px;align-items:center;background:#fff;border-radius:12px;padding:8px 12px;margin-bottom:12px">
      <select id="syr" style="margin-bottom:0"></select><span style="color:#9e9e9e;font-size:13px">年</span>
      <select id="smo" style="margin-bottom:0"></select><span id="sml" style="color:#9e9e9e;font-size:13px">月</span>
    </div>
    <div class="sc">
      <div><div style="font-size:22px;margin-bottom:4px">📷</div><div id="s-c" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">チェキ</div></div>
      <div><div style="font-size:22px;margin-bottom:4px">⭐</div><div id="s-i" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">メンバー</div></div>
      <div><div style="font-size:22px;margin-bottom:4px">🎪</div><div id="s-e" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">イベント</div></div>
    </div>
    <div style="font-size:11px;font-weight:700;color:#9e9e9e;letter-spacing:1px;margin-bottom:10px">RANKING</div>
    <div class="card" id="srank" style="padding:0;overflow:hidden"></div>
  </div>

  <div id="t-list" class="tab">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="srch" placeholder="🔍  名前・イベント・場所で検索" style="flex:1;margin-bottom:0"/>
      <button onclick="doCSV()" style="padding:9px 14px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:13px;font-weight:700;color:#3a3a3a;white-space:nowrap">⬇ CSV</button>
    </div>
    <div style="font-size:11px;font-weight:700;color:#9e9e9e;margin-bottom:6px;letter-spacing:1px">グループ</div>
    <div class="pills" id="gpills"></div>
    <div style="font-size:11px;font-weight:700;color:#9e9e9e;margin-bottom:6px;letter-spacing:1px">会場</div>
    <div class="pills" id="ppills"></div>
    <div id="lcnt" style="font-size:12px;color:#9e9e9e;margin-bottom:10px"></div>
    <div id="litems"></div>
  </div>

  <div id="t-prof" class="tab">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px">PROFILES</div>
      <button onclick="openPE(null)" style="border:none;background:#3a3a3a;color:#fff;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer">＋ 追加</button>
    </div>
    <div id="plist"></div>
  </div>

  <nav class="nav">
    <button class="on" id="n-reg" onclick="goTab('reg',this)"><span style="font-size:16px">＋</span>登録<div class="dot"></div></button>
    <button id="n-cal" onclick="goTab('cal',this)"><span style="font-size:16px">📅</span>カレンダー</button>
    <button id="n-stat" onclick="goTab('stat',this)"><span style="font-size:16px">📊</span>集計</button>
    <button id="n-list" onclick="goTab('list',this)"><span style="font-size:16px">🗂</span>一覧</button>
    <button id="n-prof" onclick="goTab('prof',this)"><span style="font-size:16px">⭐</span>プロフィール</button>
  </nav>
</div>

<div id="modal" class="mbg" onclick="if(event.target===this)closeMod()">
  <div class="modal" id="mind"></div>
</div>

<script>
// ── 設定 ──
var SB="https://itqqfcpvyhlchmaafxps.supabase.co";
var SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0cXFmY3B2eWhsY2htYWFmeHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjA5NjIsImV4cCI6MjA5Mjc5Njk2Mn0.H_cBHlh05ZThfcxX2UlVivQ8gDA-_DFdRsuVG1mqs-s";
var SH={"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+SK};
var online=false;

// ── データ ──
var CK=[], PR=[], rImg=null;
var CY=new Date().getFullYear(), CM=new Date().getMonth(), CS=null;
var SP="月別", GF="すべて", PF="すべて";
var COLS=["#9c6fde","#e9967a","#5ba87b","#e9c46a","#4ea8de","#e76f51","#adb5bd","#f4a261"];

// ── LocalStorage ──
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||"[]");}catch(e){return [];}}
function lsSave(){try{localStorage.setItem("ck",JSON.stringify(CK));localStorage.setItem("pr",JSON.stringify(PR));}catch(e){}}

// ── Supabase ──
function sbFetch(method,path,body){
  var opts={method:method,headers:Object.assign({},SH)};
  if(body) opts.body=JSON.stringify(body);
  if(method==="POST"||method==="PATCH") opts.headers["Prefer"]="return=representation";
  return fetch(SB+path,opts).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
}

// ── ヘルパー ──
function avc(name,color){
  if(color)return color;
  if(!name)return"#aaa";
  var h=0;for(var i=0;i<name.length;i++)h+=name.charCodeAt(i);
  return"hsl("+(h%360)+",55%,70%)";
}
function avH(name,color,size){
  return'<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+avc(name,color)+';font-size:'+(size*0.42)+'px">'+(name?name[0]:"?")+'</div>';
}
function thH(img,idol,color,sz){
  var w=sz==="sm"?44:sz==="md"?80:120,h=Math.round(w*1.4);
  if(img)return'<div class="thumb" style="width:'+w+'px;height:'+h+'px"><img src="'+img+'" style="width:100%;height:100%;object-fit:cover"/></div>';
  return'<div class="thumb" style="width:'+w+'px;height:'+h+'px">'+avH(idol,color,w*0.6)+'</div>';
}
function gp(c){return PR.filter(function(p){return p.idol===c.idol&&p.group_name===c.group_name;})[0]||null;}
function fd(ds){if(!ds)return"";var d=new Date(ds+"T00:00:00");return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";}
function uniq(a){var s={};return a.filter(function(v){if(!v||s[v])return false;s[v]=1;return true;});}
function tot(){document.getElementById("tlabel").textContent="Total: "+CK.length+"枚 / "+PR.length+"名";}

// ── タブ ──
function goTab(name,btn){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("on");});
  document.getElementById("t-"+name).classList.add("on");
  document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("on");var d=b.querySelector(".dot");if(d)d.remove();});
  btn.classList.add("on");
  var dot=document.createElement("div");dot.className="dot";btn.appendChild(dot);
  if(name==="cal")rCal();
  if(name==="stat")rStat();
  if(name==="list")rList();
  if(name==="prof")rProf();
}

// ── 登録 ──
document.getElementById("imgbox").onclick=function(){document.getElementById("filein").click();};
document.getElementById("filein").onchange=function(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){rImg=ev.target.result;document.getElementById("imgbox").innerHTML='<img src="'+rImg+'" style="width:100%;height:100%;object-fit:contain"/>';};
  r.readAsDataURL(f);
};
document.getElementById("rbtn").onclick=function(){
  var date=document.getElementById("r-date").value;
  var idol=document.getElementById("r-idol").value.trim();
  if(!date||!idol){alert("日付とアイドル名は必須です");return;}
  var btn=document.getElementById("rbtn");
  btn.textContent="保存中...";btn.className="btn gray";btn.disabled=true;
  var item={date:date,idol:idol,group_name:document.getElementById("r-group").value.trim(),event:document.getElementById("r-event").value.trim(),place:document.getElementById("r-place").value.trim(),image:rImg};
  function done(c){
    CK.push(c);lsSave();
    document.getElementById("r-date").value="";document.getElementById("r-idol").value="";
    document.getElementById("r-group").value="";document.getElementById("r-event").value="";
    document.getElementById("r-place").value="";rImg=null;
    document.getElementById("imgbox").innerHTML='<div style="font-size:36px;margin-bottom:8px">📷</div><div style="font-size:13px;color:#9e9e9e">タップして写真を追加</div>';
    tot();btn.textContent="✓ 保存しました！";btn.className="btn green";btn.disabled=false;
    setTimeout(function(){btn.textContent="登録する";btn.className="btn";},2500);
  }
  if(online){
    sbFetch("POST","/rest/v1/cheki",item).then(function(res){
      done(Array.isArray(res)&&res[0]?res[0]:Object.assign({id:Date.now()},item));
    });
  } else {
    done(Object.assign({id:Date.now()},item));
  }
};

// ── カレンダー ──
var WK=["日","月","火","水","木","金","土"];
document.getElementById("cprev").onclick=function(){if(CM===0){CY--;CM=11;}else CM--;CS=null;rCal();};
document.getElementById("cnext").onclick=function(){if(CM===11){CY++;CM=0;}else CM++;CS=null;rCal();};
function rCal(){
  document.getElementById("ctitle").textContent=CY+"年 "+(CM+1)+"月";
  document.getElementById("cweeks").innerHTML=WK.map(function(w,i){
    return'<div style="text-align:center;font-size:11px;font-weight:700;color:'+(i===0?"#e53935":i===6?"#1e88e5":"#9e9e9e")+';padding:4px 0">'+w+'</div>';
  }).join("");
  var bd={};CK.forEach(function(c){if(!bd[c.date])bd[c.date]=[];bd[c.date].push(c);});
  var days=new Date(CY,CM+1,0).getDate(),first=new Date(CY,CM,1).getDay(),html="";
  for(var e=0;e<first;e++)html+="<div></div>";
  for(var i=1;i<=days;i++){
    var key=CY+"-"+String(CM+1).padStart(2,"0")+"-"+String(i).padStart(2,"0");
    var its=bd[key]||[],isSel=CS===i,dow=(first+i-1)%7;
    var col=isSel?"#fff":dow===0?"#e53935":dow===6?"#1e88e5":"#3a3a3a";
    var inn='<span style="font-size:12px;font-weight:700;color:'+col+'">'+i+'</span>';
    if(its.length){
      var p=gp(its[0]);
      inn+='<div style="width:28px;height:38px;border-radius:5px;background:#e0e0e0;overflow:hidden;margin-top:2px;display:flex;align-items:center;justify-content:center">';
      inn+=its[0].image?'<img src="'+its[0].image+'" style="width:100%;height:100%;object-fit:cover"/>':avH(its[0].idol,p&&p.color,16);
      inn+='</div>';
      if(its.length>1)inn+='<span style="font-size:9px;font-weight:700;color:'+(isSel?"#fff":"#6c63ff")+'">+'+its.length+'</span>';
    }
    html+='<div class="cd" style="background:'+(isSel?"#3a3a3a":"transparent")+'" data-d="'+i+'">'+inn+'</div>';
  }
  document.getElementById("cgrid").innerHTML=html;
  document.querySelectorAll("#cgrid .cd").forEach(function(el){
    el.onclick=function(){var d=parseInt(this.getAttribute("data-d"));CS=CS===d?null:d;rCal();};
  });
  rCalList();
}
function rCalList(){
  var el=document.getElementById("clist");
  if(!CS){el.innerHTML="";return;}
  var key=CY+"-"+String(CM+1).padStart(2,"0")+"-"+String(CS).padStart(2,"0");
  var its=CK.filter(function(c){return c.date===key;});
  el.innerHTML='<div style="font-size:13px;font-weight:700;color:#9e9e9e;margin-bottom:10px">'+(CM+1)+"月"+CS+"日 — "+its.length+'枚</div>';
  if(!its.length){el.innerHTML+='<div style="text-align:center;color:#9e9e9e;font-size:13px;padding:20px 0">この日のチェキはありません</div>';return;}
  el.innerHTML+=its.map(mcH).join("");
  el.querySelectorAll(".mini-card").forEach(function(el,i){el.onclick=function(){openDet(its[i]);};});
}

// ── 集計 ──
function setStat(p,btn){
  SP=p;
  document.querySelectorAll("#t-stat .seg button").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  document.getElementById("spick").style.display=p==="全期間"?"none":"flex";
  document.getElementById("smo").style.display=p==="月別"?"block":"none";
  document.getElementById("sml").style.display=p==="月別"?"block":"none";
  rStat();
}
function rStat(){
  var yr=parseInt(document.getElementById("syr").value)||new Date().getFullYear();
  var mo=parseInt(document.getElementById("smo").value)||new Date().getMonth()+1;
  var f=CK;
  if(SP==="月別")f=CK.filter(function(c){var d=new Date((c.date||"")+"T00:00:00");return d.getFullYear()===yr&&d.getMonth()+1===mo;});
  else if(SP==="年別")f=CK.filter(function(c){return new Date((c.date||"")+"T00:00:00").getFullYear()===yr;});
  document.getElementById("s-c").textContent=f.length;
  document.getElementById("s-i").textContent=uniq(f.map(function(c){return c.idol;})).length;
  document.getElementById("s-e").textContent=uniq(f.map(function(c){return c.event;})).length;
  var cnt={};f.forEach(function(c){if(c.idol)cnt[c.idol]=(cnt[c.idol]||0)+1;});
  var rank=Object.entries(cnt).sort(function(a,b){return b[1]-a[1];});
  var max=rank.length?rank[0][1]:1;
  var el=document.getElementById("srank");
  if(!rank.length){el.innerHTML='<div style="text-align:center;color:#9e9e9e;font-size:13px;padding:24px 0">データがありません</div>';return;}
  el.innerHTML=rank.map(function(entry,i){
    var nm=entry[0],ct=entry[1];
    var md=i===0?"#ffd54f":i===1?"#cfd8dc":i===2?"#ffab91":"#eee";
    return'<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:'+(i<rank.length-1?"1px solid #e0e0e0":"none")+'">'
      +'<div style="width:24px;height:24px;border-radius:50%;background:'+md+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#555;flex-shrink:0">'+(i+1)+'</div>'
      +avH(nm,null,30)+'<span style="flex:1;font-size:14px;font-weight:700;color:#3a3a3a">'+nm+'</span>'
      +'<div style="width:80px;display:flex;align-items:center;gap:6px"><div style="flex:1;height:6px;background:#ececec;border-radius:99px;overflow:hidden"><div style="height:100%;width:'+(ct/max*100)+'%;background:#6c63ff;border-radius:99px"></div></div>'
      +'<span style="font-size:13px;font-weight:900;color:#3a3a3a;min-width:20px;text-align:right">'+ct+'</span></div></div>';
  }).join("");
}

    .sort(function(a,b){return(b.date||"").localeCompare(a.date||"");});
  document.getElementById("lcnt").textContent=f.length+"件";
