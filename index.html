<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>チェキログ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#f0f0f0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;}
input,select,textarea,button{font-family:inherit;}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #e0e0e0;}
.btn{width:100%;padding:14px;border-radius:14px;border:none;background:#3a3a3a;color:#fff;font-weight:900;font-size:15px;cursor:pointer;display:block;}
.btn.green{background:#4caf50;}.btn.red{background:#ff5252;}.btn.gray{background:#aaa;}
label{display:block;font-size:11px;color:#9e9e9e;font-weight:600;margin-bottom:4px;}
input[type=text],input[type=date],select,textarea{width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:9px 12px;font-size:14px;background:#fff;outline:none;color:#3a3a3a;margin-bottom:12px;}
.tag{background:#ede9ff;color:#6c63ff;border-radius:99px;font-size:10px;padding:2px 8px;font-weight:700;display:inline-block;}
.tag.gray{background:#f5f5f5;color:#666;}
.mini-card{display:flex;gap:12px;background:#fff;border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;border:1px solid #e0e0e0;align-items:center;}
.thumb{border-radius:8px;background:#e8e8e8;overflow:hidden;flex-shrink:0;border:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:50;}
.nav button{flex:1;padding:8px 0 10px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:#9e9e9e;}
.nav button.active{color:#6c63ff;}
.nav .dot{width:16px;height:2px;background:#6c63ff;border-radius:99px;margin-top:2px;}
.header{padding:16px 20px 12px;background:#f0f0f0;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;}
.tab{display:none;padding:16px 16px 24px;}
.tab.active{display:block;}
.seg{display:flex;background:#e4e4e4;border-radius:10px;padding:3px;gap:2px;margin-bottom:12px;}
.seg button{flex:1;padding:6px 0;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#9e9e9e;}
.seg button.active{background:#fff;color:#3a3a3a;}
.pill{padding:5px 13px;border-radius:99px;border:1.5px solid #e0e0e0;background:#fff;color:#666;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.pill.active{border-color:#6c63ff;background:#6c63ff;color:#fff;}
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#f0f0f0;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px;padding-bottom:40px;max-height:85vh;overflow-y:auto;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{border-radius:10px;padding:4px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;min-height:54px;}
.stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0 20px;}
.stat-card{background:#fff;border-radius:16px;padding:14px 10px;text-align:center;}
</style>
</head>
<body>

<div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;font-size:14px;color:#9e9e9e;">
  <div style="font-size:32px">📷</div><div>読み込み中...</div>
  <div id="load-error" style="display:none;margin-top:16px;padding:12px;background:#fff3f3;border-radius:10px;font-size:12px;color:#e53935;max-width:300px;text-align:center;"></div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div style="font-size:22px;font-weight:900;color:#3a3a3a">チェキログ</div>
    <div id="total-label" style="font-size:11px;color:#9e9e9e">Total: 0枚 / 0名</div>
  </div>

  <div id="tab-reg" class="tab active">
    <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px;margin-bottom:16px">NEW CHEKI</div>
    <div id="img-picker" style="width:100%;height:180px;background:#fff;border:2px dashed #e0e0e0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:20px;overflow:hidden;">
      <div style="font-size:36px;margin-bottom:8px">📷</div>
      <div style="font-size:13px;color:#9e9e9e">タップして写真を追加</div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none"/>
    <div class="card" style="padding:16px 16px 4px">
      <label>日付</label><input type="date" id="reg-date"/>
      <label>アイドル名 *</label><input type="text" id="reg-idol" placeholder="例: 〇〇 〇〇"/>
      <label>グループ名</label><input type="text" id="reg-group" placeholder="例: 〇〇グループ"/>
      <label>イベント名</label><input type="text" id="reg-event" placeholder="例: 〇〇フェス"/>
      <label>場所</label><input type="text" id="reg-place" placeholder="例: ライブハウス"/>
    </div>
    <button class="btn" id="reg-btn" style="margin-top:16px">登録する</button>
  </div>

  <div id="tab-cal" class="tab">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button id="cal-prev" style="width:36px;height:36px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:16px">‹</button>
      <span id="cal-title" style="font-weight:900;font-size:17px;color:#3a3a3a"></span>
      <button id="cal-next" style="width:36px;height:36px;border-radius:50%;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:16px">›</button>
    </div>
    <div class="card" style="padding:12px">
      <div class="cal-grid" id="cal-weeks"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div id="cal-list"></div>
  </div>

  <div id="tab-stat" class="tab">
    <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px;margin-bottom:12px">STATISTICS</div>
    <div class="seg">
      <button class="active" id="seg-mon" onclick="setStat('月別',this)">月別</button>
      <button id="seg-yr" onclick="setStat('年別',this)">年別</button>
      <button id="seg-all" onclick="setStat('全期間',this)">全期間</button>
    </div>
    <div id="stat-picker" style="display:flex;gap:8px;align-items:center;background:#fff;border-radius:12px;padding:8px 12px;margin-bottom:12px">
      <select id="stat-year" style="margin-bottom:0"></select><span style="color:#9e9e9e;font-size:13px">年</span>
      <select id="stat-month" style="margin-bottom:0"></select><span id="stat-ml" style="color:#9e9e9e;font-size:13px">月</span>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div style="font-size:22px;margin-bottom:4px">📷</div><div id="sc-c" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">チェキ</div></div>
      <div class="stat-card"><div style="font-size:22px;margin-bottom:4px">⭐</div><div id="sc-i" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">メンバー</div></div>
      <div class="stat-card"><div style="font-size:22px;margin-bottom:4px">🎪</div><div id="sc-e" style="font-size:28px;font-weight:900;color:#3a3a3a">0</div><div style="font-size:11px;color:#9e9e9e;font-weight:600">イベント</div></div>
    </div>
    <div style="font-size:11px;font-weight:700;color:#9e9e9e;letter-spacing:1px;margin-bottom:10px">RANKING</div>
    <div class="card" id="stat-rank" style="padding:0;overflow:hidden"></div>
  </div>

  <div id="tab-list" class="tab">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="search-in" placeholder="🔍  名前・イベント・場所で検索" style="flex:1;margin-bottom:0"/>
      <button onclick="exportCSV()" style="padding:9px 14px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:13px;font-weight:700;color:#3a3a3a;white-space:nowrap">⬇ CSV</button>
    </div>
    <div style="font-size:11px;font-weight:700;color:#9e9e9e;margin-bottom:6px;letter-spacing:1px">グループ</div>
    <div class="pills" id="grp-pills"></div>
    <div style="font-size:11px;font-weight:700;color:#9e9e9e;margin-bottom:6px;letter-spacing:1px">会場</div>
    <div class="pills" id="plc-pills"></div>
    <div id="list-cnt" style="font-size:12px;color:#9e9e9e;margin-bottom:10px"></div>
    <div id="list-items"></div>
  </div>

  <div id="tab-prof" class="tab">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:11px;color:#9e9e9e;font-weight:700;letter-spacing:1px">PROFILES</div>
      <button onclick="openProfEdit(null)" style="border:none;background:#3a3a3a;color:#fff;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer">＋ 追加</button>
    </div>
    <div id="prof-list"></div>
  </div>

  <nav class="nav">
    <button class="active" id="nav-reg" onclick="showTab('reg',this)"><span style="font-size:16px">＋</span>登録<div class="dot"></div></button>
    <button id="nav-cal" onclick="showTab('cal',this)"><span style="font-size:16px">📅</span>カレンダー</button>
    <button id="nav-stat" onclick="showTab('stat',this)"><span style="font-size:16px">📊</span>集計</button>
    <button id="nav-list" onclick="showTab('list',this)"><span style="font-size:16px">🗂</span>一覧</button>
    <button id="nav-prof" onclick="showTab('prof',this)"><span style="font-size:16px">⭐</span>プロフィール</button>
  </nav>
</div>

<div id="modal" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
var SUPA="https://itqqfcpvyhlchmaafxps.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0cXFmY3B2eWhsY2htYWFmeHBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjA5NjIsImV4cCI6MjA5Mjc5Njk2Mn0.H_cBHlh05ZThfcxX2UlVivQ8gDA-_DFdRsuVG1mqs-s";
var H={"Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY};
var chekiList=[], profiles=[], regImage=null;
var calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSel=null;
var statPeriod="月別";
var gF="すべて", pF="すべて";
var COLORS=["#9c6fde","#e9967a","#5ba87b","#e9c46a","#4ea8de","#e76f51","#adb5bd","#f4a261"];

function apiFetch(method, path, body) {
  var opts = {method:method, headers:Object.assign({},H)};
  if(body) opts.body = JSON.stringify(body);
  if(method==="POST"||method==="PATCH") opts.headers["Prefer"]="return=representation";
  return fetch(SUPA+path, opts).then(function(r){return r.json();}).catch(function(){return null;});
}

function avColor(name,color){
  if(color) return color;
  if(!name) return "#aaa";
  var h=0; for(var i=0;i<name.length;i++) h+=name.charCodeAt(i);
  return "hsl("+(h%360)+",55%,70%)";
}
function avHTML(name,color,size){
  var bg=avColor(name,color), ch=name?name[0]:"?";
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+bg+';font-size:'+(size*0.42)+'px">'+ch+'</div>';
}
function thumbHTML(image,idol,color,size){
  var w=size==="sm"?44:size==="md"?80:120, h=Math.round(w*1.4);
  if(image) return '<div class="thumb" style="width:'+w+'px;height:'+h+'px"><img src="'+image+'" style="width:100%;height:100%;object-fit:cover"/></div>';
  return '<div class="thumb" style="width:'+w+'px;height:'+h+'px">'+avHTML(idol,color,w*0.6)+'</div>';
}
function getProf(c){ return profiles.filter(function(p){return p.idol===c.idol&&p.group_name===c.group_name;})[0]||null; }
function fmtDate(ds){
  if(!ds) return "";
  var d=new Date(ds+"T00:00:00");
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
}
function uniq(arr){ var s={}; return arr.filter(function(v){if(!v||s[v])return false;s[v]=1;return true;}); }
function updateTotal(){ document.getElementById("total-label").textContent="Total: "+chekiList.length+"枚 / "+profiles.length+"名"; }

function showTab(name,btn){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  document.getElementById("tab-"+name).classList.add("active");
  document.querySelectorAll(".nav button").forEach(function(b){
    b.classList.remove("active");
    var d=b.querySelector(".dot"); if(d) d.remove();
  });
  btn.classList.add("active");
  var dot=document.createElement("div"); dot.className="dot"; btn.appendChild(dot);
  if(name==="cal") renderCal();
  if(name==="stat") renderStat();
  if(name==="list") renderList();
  if(name==="prof") renderProf();
}

// 登録
document.getElementById("img-picker").onclick=function(){document.getElementById("file-input").click();};
document.getElementById("file-input").onchange=function(e){
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){
    regImage=ev.target.result;
    document.getElementById("img-picker").innerHTML='<img src="'+regImage+'" style="width:100%;height:100%;object-fit:contain"/>';
  };
  r.readAsDataURL(f);
};
document.getElementById("reg-btn").onclick=function(){
  var date=document.getElementById("reg-date").value;
  var idol=document.getElementById("reg-idol").value.trim();
  if(!date||!idol){alert("日付とアイドル名は必須です");return;}
  var btn=document.getElementById("reg-btn");
  btn.textContent="保存中..."; btn.className="btn gray"; btn.disabled=true;
  var item={date:date,idol:idol,group_name:document.getElementById("reg-group").value.trim(),event:document.getElementById("reg-event").value.trim(),place:document.getElementById("reg-place").value.trim(),image:regImage};
  apiFetch("POST","/rest/v1/cheki",item).then(function(res){
    if(Array.isArray(res)&&res[0]) chekiList.push(res[0]);
    else chekiList.push(Object.assign({id:Date.now()},item));
    document.getElementById("reg-date").value="";
    document.getElementById("reg-idol").value="";
    document.getElementById("reg-group").value="";
    document.getElementById("reg-event").value="";
    document.getElementById("reg-place").value="";
    regImage=null;
    document.getElementById("img-picker").innerHTML='<div style="font-size:36px;margin-bottom:8px">📷</div><div style="font-size:13px;color:#9e9e9e">タップして写真を追加</div>';
    updateTotal();
    btn.textContent="✓ 保存しました！"; btn.className="btn green"; btn.disabled=false;
    setTimeout(function(){btn.textContent="登録する";btn.className="btn";},2500);
  });
};

// カレンダー
var WEEK=["日","月","火","水","木","金","土"];
document.getElementById("cal-prev").onclick=function(){if(calMonth===0){calYear--;calMonth=11;}else calMonth--;calSel=null;renderCal();};
document.getElementById("cal-next").onclick=function(){if(calMonth===11){calYear++;calMonth=0;}else calMonth++;calSel=null;renderCal();};
function renderCal(){
  document.getElementById("cal-title").textContent=calYear+"年 "+(calMonth+1)+"月";
  document.getElementById("cal-weeks").innerHTML=WEEK.map(function(w,i){
    return '<div style="text-align:center;font-size:11px;font-weight:700;color:'+(i===0?"#e53935":i===6?"#1e88e5":"#9e9e9e")+';padding:4px 0">'+w+'</div>';
  }).join("");
  var byDate={};
  chekiList.forEach(function(c){if(!byDate[c.date])byDate[c.date]=[];byDate[c.date].push(c);});
  var days=new Date(calYear,calMonth+1,0).getDate();
  var first=new Date(calYear,calMonth,1).getDay();
  var html="";
  for(var e=0;e<first;e++) html+='<div></div>';
  for(var i=1;i<=days;i++){
    var key=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(i).padStart(2,"0");
    var items=byDate[key]||[], isSel=calSel===i, dow=(first+i-1)%7;
    var col=isSel?"#fff":dow===0?"#e53935":dow===6?"#1e88e5":"#3a3a3a";
    var inner='<span style="font-size:12px;font-weight:700;color:'+col+'">'+i+'</span>';
    if(items.length>0){
      var p=getProf(items[0]);
      inner+='<div style="width:28px;height:38px;border-radius:5px;background:#e0e0e0;overflow:hidden;margin-top:2px;display:flex;align-items:center;justify-content:center">';
      if(items[0].image) inner+='<img src="'+items[0].image+'" style="width:100%;height:100%;object-fit:cover"/>';
      else inner+=avHTML(items[0].idol,p&&p.color,16);
      inner+='</div>';
      if(items.length>1) inner+='<span style="font-size:9px;font-weight:700;color:'+(isSel?"#fff":"#6c63ff")+'">+'+items.length+'</span>';
    }
    var d=i;
    html+='<div class="cal-day" style="background:'+(isSel?"#3a3a3a":"transparent")+'" data-d="'+d+'">'+inner+'</div>';
  }
  document.getElementById("cal-grid").innerHTML=html;
  document.querySelectorAll("#cal-grid .cal-day").forEach(function(el){
    el.onclick=function(){var d=parseInt(this.getAttribute("data-d"));calSel=calSel===d?null:d;renderCal();};
  });
  renderCalList();
}
function renderCalList(){
  var el=document.getElementById("cal-list");
  if(!calSel){el.innerHTML="";return;}
  var key=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(calSel).padStart(2,"0");
  var items=chekiList.filter(function(c){return c.date===key;});
  el.innerHTML='<div style="font-size:13px;font-weight:700;color:#9e9e9e;margin-bottom:10px">'+(calMonth+1)+"月"+calSel+"日 — "+items.length+'枚</div>';
  if(!items.length){el.innerHTML+='<div style="text-align:center;color:#9e9e9e;font-size:13px;padding:20px 0">この日のチェキはありません</div>';return;}
  el.innerHTML+=items.map(miniCardHTML).join("");
  el.querySelectorAll(".mini-card").forEach(function(el,i){el.onclick=function(){openDetail(items[i]);};});
}

// 集計
function setStat(p,btn){
  statPeriod=p;
  document.querySelectorAll(".seg button").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  document.getElementById("stat-picker").style.display=p==="全期間"?"none":"flex";
  document.getElementById("stat-month").style.display=p==="月別"?"block":"none";
  document.getElementById("stat-ml").style.display=p==="月別"?"block":"none";
  renderStat();
}
function renderStat(){
  var yr=parseInt(document.getElementById("stat-year").value)||new Date().getFullYear();
  var mo=parseInt(document.getElementById("stat-month").value)||new Date().getMonth()+1;
  var f=chekiList;
  if(statPeriod==="月別") f=chekiList.filter(function(c){var d=new Date((c.date||"")+"T00:00:00");return d.getFullYear()===yr&&d.getMonth()+1===mo;});
  else if(statPeriod==="年別") f=chekiList.filter(function(c){return new Date((c.date||"")+"T00:00:00").getFullYear()===yr;});
  document.getElementById("sc-c").textContent=f.length;
  document.getElementById("sc-i").textContent=uniq(f.map(function(c){return c.idol;})).length;
  document.getElementById("sc-e").textContent=uniq(f.map(function(c){return c.event;})).length;
  var cnt={};
  f.forEach(function(c){if(c.idol)cnt[c.idol]=(cnt[c.idol]||0)+1;});
  var rank=Object.entries(cnt).sort(function(a,b){return b[1]-a[1];});
  var max=rank.length?rank[0][1]:1;
  var rankEl=document.getElementById("stat-rank");
  if(!rank.length){rankEl.innerHTML='<div style="text-align:center;color:#9e9e9e;font-size:13px;padding:24px 0">データがありません</div>';return;}
  rankEl.innerHTML=rank.map(function(entry,i){
    var name=entry[0],count=entry[1];
    var medal=i===0?"#ffd54f":i===1?"#cfd8dc":i===2?"#ffab91":"#eee";
    return '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:'+(i<rank.length-1?"1px solid #e0e0e0":"none")+'">'
      +'<div style="width:24px;height:24px;border-radius:50%;background:'+medal+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#555;flex-shrink:0">'+(i+1)+'</div>'
      +avHTML(name,null,30)
      +'<span style="flex:1;font-size:14px;font-weight:700;color:#3a3a3a">'+name+'</span>'

function renderList(){
  var search=document.getElementById("search-in").value;
  var groups=["すべて"].concat(uniq(chekiList.map(function(c){return c.group_name;})));
  var places=["すべて"].concat(uniq(chekiList.map(function(c){return c.place;})));
  document.getElementById("grp-pills").innerHTML=groups.map(function(g){
    return '<button class="pill'+(gF===g?" active":"")+'" onclick="setGF(\''+g.replace(/'/g,"\\'")+'\')">' +g+'</button>';
  }).join("");
  document.getElementById("plc-pills").innerHTML=places.map(function(p){
    return '<button class="pill'+(pF===p?" active":"")+'" onclick="setPF(\''+p.replace(/'/g,"\\'")+'\')">' +p+'</button>';
  }).join("");
  var f=chekiList.filter(function(c){return gF==="すべて"||c.group_name===gF;})
    .filter(function(c){return pF==="すべて"||c.place===pF;})
    .filter(function(c){return !search||[c.idol,c.event,c.place,c.group_name,c.date].some(function(v){return v&&v.includes(search);});})
    .sort(function(a,b){return (b.date||"").localeCompare(a.date||"");});
  document.getElementById("list-cnt").textContent=f.length+"件";
  var el=document.getElementById("list-items");
  if(!f.length){el.innerHTML='<div style="text-align:center;color:#9e9e9e;font-size:13px;padding:32px 0">該当するチェキがありません</div>';return;}
  el.innerHTML=f.map(miniCardHTML).join("");
  el.querySelectorAll(".mini-card").forEach(function(el,i){el.onclick=function(){openDetail(f[i]);};});
}
function setGF(g){gF=g;renderList();}
function setPF(p){pF=p;renderList();}
function exportCSV(){
  var header="日付,アイドル名,グループ名,イベント名,場所";
  var rows=chekiList.map(function(c){return [c.date,c.idol,c.group_name,c.event,c.place].map(function(v){return '"'+(v||"").replace(/"/g,'""')+'"';}).join(",");});
  var csv="\uFEFF"+[header].concat(rows).join("\n");
  var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="chekiLog.csv";a.click();
}
