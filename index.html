<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>チェキログ</title>
</head>
<body style="font-family:sans-serif;padding:20px;background:#f0f0f0;">

<h2>チェキログ テスト</h2>
<p id="msg">ボタンをタップしてください</p>

<button onclick="document.getElementById('msg').textContent='登録ボタン OK！'" 
style="display:block;width:100%;padding:16px;margin:10px 0;font-size:16px;background:#3a3a3a;color:white;border:none;border-radius:12px;">
登録ボタン
</button>

<button onclick="document.getElementById('msg').textContent='カレンダーボタン OK！'" 
style="display:block;width:100%;padding:16px;margin:10px 0;font-size:16px;background:#6c63ff;color:white;border:none;border-radius:12px;">
カレンダーボタン
</button>

<input type="file" accept="image/*" onchange="document.getElementById('msg').textContent='写真選択 OK！'"
style="display:block;margin:10px 0;font-size:16px;"/>

</body>
</html>
