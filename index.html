<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>テスト</title>
</head>
<body style="padding:30px;background:#f0f0f0;font-family:sans-serif;">
<h2 id="msg">タップ前</h2>
<button id="btn1" style="display:block;width:100%;padding:20px;margin:10px 0;font-size:18px;background:#3a3a3a;color:white;border:none;border-radius:12px;">
  ボタン1
</button>
<button id="btn2" style="display:block;width:100%;padding:20px;margin:10px 0;font-size:18px;background:#6c63ff;color:white;border:none;border-radius:12px;">
  ボタン2
</button>
<script>
window.addEventListener("DOMContentLoaded",function(){
  document.getElementById("msg").textContent="JS読み込みOK";
  document.getElementById("btn1").addEventListener("click",function(){
    document.getElementById("msg").textContent="ボタン1 タップOK！";
  });
  document.getElementById("btn2").addEventListener("click",function(){
    document.getElementById("msg").textContent="ボタン2 タップOK！";
  });
});
</script>
</body>
</html>
